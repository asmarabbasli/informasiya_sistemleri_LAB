<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NeuralDraw</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070e;--s1:#0e0e1c;--s2:#14142a;
  --b1:rgba(100,80,255,.12);--b2:rgba(100,80,255,.28);
  --acc:#9955ff;--acc2:#44ffbb;--acc3:#ff5566;
  --text:#eeeaff;--muted:#554488;
  --fh:'Orbitron',monospace;--fm:'Share Tech Mono',monospace;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--fm)}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 40% at 25% 15%,rgba(100,60,255,.07),transparent),
             radial-gradient(ellipse 50% 50% at 80% 85%,rgba(60,255,180,.04),transparent)}

.app{max-width:900px;margin:0 auto;padding:28px 16px 50px;display:flex;flex-direction:column;align-items:center;gap:20px;position:relative;z-index:1}

h1{font-family:var(--fh);font-size:clamp(22px,5vw,42px);font-weight:900;letter-spacing:3px;text-align:center;
   background:linear-gradient(120deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;text-align:center}

/* ── TABS ── */
.tabs{display:flex;gap:0;border:1px solid var(--b2);border-radius:10px;overflow:hidden;width:100%;max-width:500px}
.tab{flex:1;padding:10px;background:transparent;border:none;color:var(--muted);font-family:var(--fm);font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:.2s;border-right:1px solid var(--b2)}
.tab:last-child{border-right:none}
.tab.active{background:var(--acc);color:#fff;font-weight:700}

/* ── COLLECT PHASE ── */
#collectPhase{width:100%;display:flex;flex-direction:column;align-items:center;gap:16px}
.digit-progress{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;width:100%;max-width:500px}
.dp-cell{background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:6px 4px;text-align:center;transition:.3s}
.dp-cell.done{border-color:var(--acc2);background:rgba(68,255,187,.08)}
.dp-num{font-family:var(--fh);font-size:16px;color:var(--muted)}
.dp-cell.done .dp-num{color:var(--acc2)}
.dp-count{font-size:9px;color:var(--muted);letter-spacing:1px}

.collect-main{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;align-items:flex-start;width:100%}
.draw-card{background:var(--s1);border:1px solid var(--b2);border-radius:16px;padding:18px;display:flex;flex-direction:column;align-items:center;gap:12px}
.card-lbl{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);text-align:center}
.target-digit{font-family:var(--fh);font-size:52px;font-weight:900;color:var(--acc);text-shadow:0 0 24px rgba(153,85,255,.5);line-height:1;text-align:center}
#collectCanvas{background:#000;border-radius:10px;cursor:crosshair;border:2px solid var(--b2);display:block;touch-action:none;transition:border-color .2s,box-shadow .2s}
#collectCanvas.on{border-color:var(--acc);box-shadow:0 0 20px rgba(153,85,255,.22)}
.btns{display:flex;gap:8px;width:100%}
.btn{flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer;font-family:var(--fm);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;transition:.18s}
.btn-c{background:var(--s2);color:var(--muted);border:1px solid var(--b2)}
.btn-c:hover{color:var(--text)}
.btn-save{background:linear-gradient(135deg,#6030cc,#3090cc);color:#fff;box-shadow:0 4px 16px rgba(96,48,204,.3)}
.btn-save:hover{box-shadow:0 6px 24px rgba(96,48,204,.5);transform:translateY(-1px)}
.btn-save:disabled{opacity:.3;cursor:not-allowed;transform:none}
.btn-train{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#07070e;font-weight:700;box-shadow:0 4px 20px rgba(153,85,255,.35)}
.btn-train:hover{box-shadow:0 6px 28px rgba(153,85,255,.55);transform:translateY(-1px)}
.btn-train:disabled{opacity:.3;cursor:not-allowed;transform:none}

.collect-right{display:flex;flex-direction:column;gap:10px;min-width:200px}
.samples-box{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:8px}
.sb-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.sample-strip{display:flex;flex-wrap:wrap;gap:4px;min-height:40px}
.sample-thumb{border-radius:4px;border:1px solid var(--b1);image-rendering:pixelated}

.train-box{background:var(--s1);border:1px solid var(--b2);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px}
.tb-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.prog-track{height:4px;background:var(--s2);border-radius:999px;overflow:hidden}
.prog-fill{height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .2s}
.train-status{font-size:11px;color:var(--muted)}
.train-status b{color:var(--acc2)}

/* ── TEST PHASE ── */
#testPhase{width:100%;display:flex;flex-direction:column;align-items:center;gap:16px}
.test-layout{display:flex;gap:16px;width:100%;flex-wrap:wrap;justify-content:center}
.result-card{flex:1;min-width:220px;background:var(--s1);border:1px solid var(--b2);border-radius:16px;padding:18px;display:flex;flex-direction:column;gap:14px}
.big-box{display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--s2);border-radius:12px;padding:20px;border:1px solid var(--b1);min-height:110px;position:relative;overflow:hidden}
.big-box::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 110%,rgba(153,85,255,.08),transparent 70%)}
.res-d{font-family:var(--fh);font-size:68px;font-weight:900;line-height:1;color:var(--acc);text-shadow:0 0 28px rgba(153,85,255,.5)}
.res-d.pop{animation:pop .25s ease}
@keyframes pop{0%{transform:scale(.4);opacity:.1}65%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
.res-conf{font-size:11px;color:var(--muted);margin-top:3px}
.res-conf b{color:var(--acc2)}
.bars-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.bars{display:flex;flex-direction:column;gap:4px}
.brow{display:grid;grid-template-columns:14px 1fr 32px;align-items:center;gap:6px}
.bd{font-size:10px;color:var(--muted);text-align:center;font-family:var(--fh)}
.btrack{height:5px;background:var(--s2);border-radius:999px;overflow:hidden}
.bfill{height:100%;width:0%;border-radius:999px;background:var(--b2);transition:width .35s cubic-bezier(.4,0,.2,1)}
.brow.win .bd{color:var(--acc);font-weight:700}
.brow.win .bfill{background:linear-gradient(90deg,var(--acc),var(--acc2))}
.bpct{font-size:9px;color:var(--muted);text-align:right}
.brow.win .bpct{color:var(--text)}

.hint{font-size:10px;color:var(--muted);text-align:center;line-height:1.9}
.hint b{color:var(--acc)}

/* score badge */
.score-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.score-badge{background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:8px 14px;text-align:center}
.sb-val{font-family:var(--fh);font-size:20px;color:var(--acc2)}
.sb-lbl{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
</style>
</head>
<body>
<div class="app">
  <h1>NEURAL DRAW</h1>
  <p class="sub">Öz əl yazını öyrət · Sonra tanısın</p>

  <div class="tabs">
    <button class="tab active" id="tab1" onclick="showTab(1)">① Öyrət</button>
    <button class="tab" id="tab2" onclick="showTab(2)" id="tab2">② Test Et</button>
  </div>

  <!-- COLLECT PHASE -->
  <div id="collectPhase">
    <div class="digit-progress" id="digitProgress"></div>

    <div class="collect-main">
      <div class="draw-card">
        <span class="card-lbl">Hədəf rəqəm</span>
        <div class="target-digit" id="targetDigit">0</div>
        <canvas id="collectCanvas" width="240" height="240"></canvas>
        <div class="btns">
          <button class="btn btn-c" id="cclearBtn">Sil</button>
          <button class="btn btn-save" id="saveBtn">Saxla ✓</button>
        </div>
        <div style="font-size:10px;color:var(--muted);text-align:center">
          Hər rəqəmdən ən az <b style="color:var(--acc)">3</b> nümunə lazımdır
        </div>
      </div>

      <div class="collect-right">
        <div class="samples-box">
          <div class="sb-title">Saxlanmış nümunələr — <span id="curDigitLbl">0</span></div>
          <div class="sample-strip" id="sampleStrip"></div>
        </div>
        <div class="train-box">
          <div class="tb-title">Şəbəkəni öyrət</div>
          <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
          <div class="train-status" id="trainStatus">Hər rəqəmdən 3+ nümunə topla</div>
          <button class="btn btn-train" id="trainBtn" disabled onclick="startTrain()">⚡ Öyrət</button>
        </div>
      </div>
    </div>
  </div>

  <!-- TEST PHASE -->
  <div id="testPhase" style="display:none">
    <div class="score-row">
      <div class="score-badge"><div class="sb-val" id="scoreCorrect">0</div><div class="sb-lbl">Düzgün</div></div>
      <div class="score-badge"><div class="sb-val" id="scoreTotal">0</div><div class="sb-lbl">Cəmi</div></div>
      <div class="score-badge"><div class="sb-val" id="scoreAcc">—</div><div class="sb-lbl">Dəqiqlik</div></div>
    </div>
    <div class="test-layout">
      <div class="draw-card">
        <span class="card-lbl">Rəqəm çək</span>
        <canvas id="testCanvas" width="240" height="240"></canvas>
        <div class="btns">
          <button class="btn btn-c" id="tclearBtn">Sil</button>
          <button class="btn btn-save" id="predBtn">Tanı →</button>
        </div>
      </div>
      <div class="result-card">
        <div class="big-box">
          <div class="res-d" id="resD">?</div>
          <div class="res-conf" id="resC">Rəqəm çəkib Tanı bas</div>
        </div>
        <span class="bars-lbl">Ehtimallar</span>
        <div class="bars" id="barsEl"></div>
      </div>
    </div>
    <p class="hint"><b>İpucu:</b> Öyrətdiyindəki kimi çək · Eyni ölçü, eyni yer</p>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════
//  NEURAL NETWORK  784 → 64 → 32 → 10
// ═══════════════════════════════════════════════════
const IN=784,H1=64,H2=32,OUT=10;
const relu=v=>v>0?v:0;
const reluD=v=>v>0?1:0;
function softmax(z){const m=Math.max(...z),e=z.map(v=>Math.exp(v-m)),s=e.reduce((a,b)=>a+b,0);return e.map(v=>v/s)}
function randn(){let u=Math.random()+1e-9,v=Math.random()+1e-9;return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v)}
function heInit(r,c,fan){const s=Math.sqrt(2/fan),a=new Float32Array(r*c);for(let i=0;i<a.length;i++)a[i]=randn()*s;return a}
const Z=n=>new Float32Array(n);

let W1,b1,W2,b2,W3,b3;
let mW1,vW1,mb1,vb1,mW2,vW2,mb2,vb2,mW3,vW3,mb3,vb3,AT=0;
const LR=0.005,B1=.9,B2=.999,EPS=1e-8;

function initNet(){
  W1=heInit(H1,IN,IN);b1=Z(H1);
  W2=heInit(H2,H1,H1);b2=Z(H2);
  W3=heInit(OUT,H2,H2);b3=Z(OUT);
  mW1=Z(W1.length);vW1=Z(W1.length);mb1=Z(H1);vb1=Z(H1);
  mW2=Z(W2.length);vW2=Z(W2.length);mb2=Z(H2);vb2=Z(H2);
  mW3=Z(W3.length);vW3=Z(W3.length);mb3=Z(OUT);vb3=Z(OUT);
  AT=0;
}

function fwd(x,drop=false){
  const DR=0.15,SC=1/(1-DR);
  // layer 1
  const z1=Z(H1);
  for(let i=0;i<H1;i++){let s=b1[i];for(let j=0;j<IN;j++)s+=W1[i*IN+j]*x[j];z1[i]=s}
  let a1=z1.map(relu);
  if(drop)a1=a1.map(v=>Math.random()<DR?0:v*SC);
  // layer 2
  const z2=Z(H2);
  for(let i=0;i<H2;i++){let s=b2[i];for(let j=0;j<H1;j++)s+=W2[i*H1+j]*a1[j];z2[i]=s}
  let a2=z2.map(relu);
  if(drop)a2=a2.map(v=>Math.random()<DR?0:v*SC);
  // layer 3
  const z3=Z(OUT);
  for(let i=0;i<OUT;i++){let s=b3[i];for(let j=0;j<H2;j++)s+=W3[i*H2+j]*a2[j];z3[i]=s}
  const a3=softmax(Array.from(z3));
  return{z1,a1,z2,a2,z3,a3};
}

function bwd(x,yHot,c){
  const{z1,a1,z2,a2,a3}=c;
  const dz3=a3.map((v,i)=>v-yHot[i]);
  const dW3=Z(OUT*H2),db3=new Float32Array(dz3);
  for(let i=0;i<OUT;i++)for(let j=0;j<H2;j++)dW3[i*H2+j]=a2[j]*dz3[i];
  const da2=Z(H2);for(let j=0;j<H2;j++)for(let i=0;i<OUT;i++)da2[j]+=W3[i*H2+j]*dz3[i];
  const dz2=da2.map((v,i)=>v*reluD(z2[i]));
  const dW2=Z(H2*H1),db2=new Float32Array(dz2);
  for(let i=0;i<H2;i++)for(let j=0;j<H1;j++)dW2[i*H1+j]=a1[j]*dz2[i];
  const da1=Z(H1);for(let j=0;j<H1;j++)for(let i=0;i<H2;i++)da1[j]+=W2[i*H1+j]*dz2[i];
  const dz1=da1.map((v,i)=>v*reluD(z1[i]));
  const dW1=Z(H1*IN),db1=new Float32Array(dz1);
  for(let i=0;i<H1;i++)for(let j=0;j<IN;j++)dW1[i*IN+j]=x[j]*dz1[i];
  return{dW1,db1,dW2,db2,dW3,db3};
}

function adamUpd(W,dW,mW,vW){
  for(let i=0;i<W.length;i++){
    mW[i]=B1*mW[i]+(1-B1)*dW[i];
    vW[i]=B2*vW[i]+(1-B2)*dW[i]*dW[i];
    W[i]-=LR*(mW[i]/(1-B1**AT))/(Math.sqrt(vW[i]/(1-B2**AT))+EPS);
  }
}
function step(g){AT++;adamUpd(W1,g.dW1,mW1,vW1);adamUpd(b1,g.db1,mb1,vb1);adamUpd(W2,g.dW2,mW2,vW2);adamUpd(b2,g.db2,mb2,vb2);adamUpd(W3,g.dW3,mW3,vW3);adamUpd(b3,g.db3,mb3,vb3)}

// ═══════════════════════════════════════════════════
//  DATA AUGMENTATION — ölçü/mövqe dəyişkənliyi
// ═══════════════════════════════════════════════════
function augment(px){
  // Random shift ±2px
  const dx=Math.round((Math.random()-.5)*4);
  const dy=Math.round((Math.random()-.5)*4);
  const out=new Float32Array(784);
  for(let r=0;r<28;r++)for(let c=0;c<28;c++){
    const nr=r+dy,nc=c+dx;
    if(nr>=0&&nr<28&&nc>=0&&nc<28)out[nr*28+nc]=px[r*28+c];
  }
  // Random noise
  for(let i=0;i<784;i++)out[i]=Math.max(0,Math.min(1,out[i]+(Math.random()-.5)*0.06));
  return out;
}

// Centre of mass
function centre(px){
  let sx=0,sy=0,tot=0;
  for(let r=0;r<28;r++)for(let c=0;c<28;c++){const v=px[r*28+c];sx+=c*v;sy+=r*v;tot+=v;}
  if(tot<1)return px;
  const dx=Math.round(14-sx/tot),dy=Math.round(14-sy/tot);
  const sh=new Float32Array(784);
  for(let r=0;r<28;r++)for(let c=0;c<28;c++){const nr=r+dy,nc=c+dx;if(nr>=0&&nr<28&&nc>=0&&nc<28)sh[nr*28+nc]=px[r*28+c];}
  return sh;
}

// ═══════════════════════════════════════════════════
//  CANVAS HELPER
// ═══════════════════════════════════════════════════
function makeCanvas(id,size=240){
  const cv=document.getElementById(id),ctx=cv.getContext('2d');
  ctx.fillStyle='#000';ctx.fillRect(0,0,size,size);
  ctx.strokeStyle='#fff';ctx.lineWidth=Math.round(size*0.075);ctx.lineCap='round';ctx.lineJoin='round';
  let painting=false,lx=0,ly=0;
  const pos=e=>{const r=cv.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return[(s.clientX-r.left)*(size/r.width),(s.clientY-r.top)*(size/r.height)]};
  cv.addEventListener('mousedown',e=>{painting=true;[lx,ly]=pos(e);cv.classList.add('on')});
  cv.addEventListener('touchstart',e=>{e.preventDefault();painting=true;[lx,ly]=pos(e);cv.classList.add('on')},{passive:false});
  cv.addEventListener('mousemove',e=>{if(!painting)return;const[x,y]=pos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(x,y);ctx.stroke();[lx,ly]=[x,y]});
  cv.addEventListener('touchmove',e=>{e.preventDefault();if(!painting)return;const[x,y]=pos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(x,y);ctx.stroke();[lx,ly]=[x,y]},{passive:false});
  ['mouseup','mouseleave','touchend'].forEach(ev=>cv.addEventListener(ev,()=>{painting=false;cv.classList.remove('on')}));
  return{
    clear(){ctx.fillStyle='#000';ctx.fillRect(0,0,size,size)},
    getPixels(){
      const t=document.createElement('canvas');t.width=t.height=28;
      const tc=t.getContext('2d');tc.drawImage(cv,0,0,28,28);
      const d=tc.getImageData(0,0,28,28).data;
      const px=new Float32Array(784);
      for(let i=0;i<784;i++)px[i]=d[i*4]/255;
      return centre(px);
    },
    getThumb(){
      const t=document.createElement('canvas');t.width=t.height=28;
      t.getContext('2d').drawImage(cv,0,0,28,28);
      return t.toDataURL();
    }
  };
}

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
// samples[digit] = array of Float32Array(784)
const samples=Array.from({length:10},()=>[]);
let currentDigit=0;
let scoreCorrect=0,scoreTotal=0;

const cc=makeCanvas('collectCanvas',240);
const tc=makeCanvas('testCanvas',240);

// ═══════════════════════════════════════════════════
//  COLLECT UI
// ═══════════════════════════════════════════════════
const MIN_SAMPLES=3;
const AUG_PER_SAMPLE=15; // augment each real sample 15×

// Build digit progress cells
const dp=document.getElementById('digitProgress');
for(let i=0;i<10;i++){
  dp.innerHTML+=`<div class="dp-cell" id="dpc${i}"><div class="dp-num">${i}</div><div class="dp-count" id="dpcnt${i}">0</div></div>`;
}

function setTarget(d){
  currentDigit=d;
  document.getElementById('targetDigit').textContent=d;
  document.getElementById('curDigitLbl').textContent=d;
  cc.clear();
  refreshSampleStrip();
  checkTrainReady();
}

function refreshSampleStrip(){
  const strip=document.getElementById('sampleStrip');
  strip.innerHTML='';
  samples[currentDigit].forEach(({thumb})=>{
    const img=document.createElement('img');
    img.src=thumb;img.width=36;img.height=36;img.className='sample-thumb';
    strip.appendChild(img);
  });
}

function updateDigitProgress(){
  for(let i=0;i<10;i++){
    const n=samples[i].length;
    document.getElementById('dpcnt'+i).textContent=n;
    document.getElementById('dpc'+i).classList.toggle('done',n>=MIN_SAMPLES);
  }
}

function checkTrainReady(){
  const ready=samples.every(s=>s.length>=MIN_SAMPLES);
  document.getElementById('trainBtn').disabled=!ready;
  document.getElementById('trainStatus').innerHTML=ready
    ?'Hazırdır! Öyrətməyə başla'
    :`Hər rəqəmdən ${MIN_SAMPLES}+ nümunə lazımdır`;
}

// Save button
document.getElementById('saveBtn').onclick=()=>{
  const px=cc.getPixels();
  const sum=px.reduce((a,b)=>a+b,0);
  if(sum<5){alert('Kətan boşdur! Əvvəlcə rəqəm çək.');return;}
  samples[currentDigit].push({px,thumb:cc.getThumb()});
  cc.clear();
  updateDigitProgress();
  refreshSampleStrip();
  checkTrainReady();
  // auto-advance digit
  if(samples[currentDigit].length>=MIN_SAMPLES){
    const next=(currentDigit+1)%10;
    setTarget(next);
  }
};
document.getElementById('cclearBtn').onclick=()=>cc.clear();

// Digit cell click
for(let i=0;i<10;i++){
  document.getElementById('dpc'+i).onclick=()=>setTarget(i);
}
setTarget(0);

// ═══════════════════════════════════════════════════
//  TRAINING
// ═══════════════════════════════════════════════════
async function startTrain(){
  document.getElementById('trainBtn').disabled=true;
  const status=document.getElementById('trainStatus');
  const prog=document.getElementById('progFill');

  // Build dataset with augmentation
  const data=[];
  for(let d=0;d<10;d++){
    samples[d].forEach(({px})=>{
      // Add original
      const y=new Float32Array(10);y[d]=1;
      data.push({x:px,y});
      // Add augmented copies
      for(let a=0;a<AUG_PER_SAMPLE;a++){
        data.push({x:augment(px),y});
      }
    });
  }
  // Shuffle
  for(let i=data.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[data[i],data[j]]=[data[j],data[i]];}

  initNet();
  const EPOCHS=80,BS=16;
  status.innerHTML=`Öyrənir… (${data.length} nümunə)`;

  for(let ep=0;ep<EPOCHS;ep++){
    // shuffle
    for(let i=data.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[data[i],data[j]]=[data[j],data[i]];}
    let loss=0,ok=0;
    for(let i=0;i<data.length;i+=BS){
      const batch=data.slice(i,i+BS);
      const gW1=Z(W1.length),gb1=Z(H1),gW2=Z(W2.length),gb2=Z(H2),gW3=Z(W3.length),gb3=Z(OUT);
      batch.forEach(({x,y})=>{
        const c=fwd(x,true),g=bwd(x,y,c);
        for(let k=0;k<gW1.length;k++)gW1[k]+=g.dW1[k];for(let k=0;k<gb1.length;k++)gb1[k]+=g.db1[k];
        for(let k=0;k<gW2.length;k++)gW2[k]+=g.dW2[k];for(let k=0;k<gb2.length;k++)gb2[k]+=g.db2[k];
        for(let k=0;k<gW3.length;k++)gW3[k]+=g.dW3[k];for(let k=0;k<gb3.length;k++)gb3[k]+=g.db3[k];
        const lbl=Array.from(y).indexOf(1);
        loss-=Math.log(Math.max(c.a3[lbl],1e-9));
        if(c.a3.indexOf(Math.max(...c.a3))===lbl)ok++;
      });
      const inv=1/batch.length;
      step({dW1:gW1.map(v=>v*inv),db1:gb1.map(v=>v*inv),dW2:gW2.map(v=>v*inv),db2:gb2.map(v=>v*inv),dW3:gW3.map(v=>v*inv),db3:gb3.map(v=>v*inv)});
    }
    const pct=((ep+1)/EPOCHS*100);
    prog.style.width=pct+'%';
    if((ep+1)%10===0){
      const acc=(ok/data.length*100).toFixed(0);
      status.innerHTML=`Epoch ${ep+1}/${EPOCHS} · Dəqiqlik: <b>${acc}%</b>`;
      await new Promise(r=>setTimeout(r,0));
    }
  }
  status.innerHTML='<b style="color:var(--acc2)">✓ Hazırdır! Test etməyə keç.</b>';
  document.getElementById('trainBtn').disabled=false;
  // switch to test tab
  showTab(2);
}

// ═══════════════════════════════════════════════════
//  TEST UI
// ═══════════════════════════════════════════════════
// Build bars
const barsEl=document.getElementById('barsEl');
barsEl.innerHTML=Array.from({length:10},(_,i)=>`
  <div class="brow" id="br${i}">
    <span class="bd">${i}</span>
    <div class="btrack"><div class="bfill" id="bf${i}"></div></div>
    <span class="bpct" id="bp${i}">0%</span>
  </div>`).join('');

function updateBars(p){
  const best=p.indexOf(Math.max(...p));
  for(let i=0;i<10;i++){
    const pct=(p[i]*100).toFixed(1);
    document.getElementById('bf'+i).style.width=pct+'%';
    document.getElementById('bp'+i).textContent=Math.round(pct)+'%';
    document.getElementById('br'+i).classList.toggle('win',i===best);
  }
}
function resetBars(){for(let i=0;i<10;i++){document.getElementById('bf'+i).style.width='0%';document.getElementById('bp'+i).textContent='0%';document.getElementById('br'+i).classList.remove('win')}}

const resD=document.getElementById('resD'),resC=document.getElementById('resC');
document.getElementById('predBtn').onclick=()=>{
  if(!W1){alert('Əvvəlcə şəbəkəni öyrət!');return;}
  const px=tc.getPixels();
  if(px.reduce((a,b)=>a+b,0)<3){return;}
  const{a3}=fwd(px,false);
  const best=a3.indexOf(Math.max(...a3));
  resD.textContent=best;
  resD.classList.remove('pop');void resD.offsetWidth;resD.classList.add('pop');
  resC.innerHTML=`Ehtimal: <b>${(a3[best]*100).toFixed(1)}%</b>`;
  updateBars(a3);
  scoreTotal++;
  document.getElementById('scoreTotal').textContent=scoreTotal;
  document.getElementById('scoreAcc').textContent=scoreTotal?Math.round(scoreCorrect/scoreTotal*100)+'%':'—';
  tc.clear();resetBars();
};
document.getElementById('tclearBtn').onclick=()=>{tc.clear();resetBars();resD.textContent='?';resC.textContent='Rəqəm çəkib Tanı bas';};

function showTab(n){
  document.getElementById('collectPhase').style.display=n===1?'flex':'none';
  document.getElementById('testPhase').style.display=n===2?'flex':'none';
  document.getElementById('tab1').classList.toggle('active',n===1);
  document.getElementById('tab2').classList.toggle('active',n===2);
}
</script>
