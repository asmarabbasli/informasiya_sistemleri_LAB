<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AnimalAI — Şəkil Tanıma</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f3ee;
  --card:#ffffff;
  --card2:#f0ebe3;
  --ink:#1c1812;
  --border:#e0d8cc;
  --acc:#ff6b2b;
  --acc2:#2b7fff;
  --green:#1db85a;
  --muted:#9b8e7e;
  --fh:'Outfit',sans-serif;
  --fm:'JetBrains Mono',monospace;
}
html,body{min-height:100%;background:var(--bg);color:var(--ink);font-family:var(--fh)}

/* subtle dot grid */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(circle,rgba(0,0,0,.06) 1px,transparent 1px);
  background-size:28px 28px}

.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:36px 18px 60px;display:flex;flex-direction:column;align-items:center;gap:24px}

/* header */
.hdr{text-align:center}
h1{font-size:clamp(28px,6vw,52px);font-weight:800;letter-spacing:-1.5px;line-height:1.1}
h1 em{font-style:normal;color:var(--acc)}
.sub{font-family:var(--fm);font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:6px}

/* status pill */
.status-pill{display:flex;align-items:center;gap:8px;background:var(--card);border:1.5px solid var(--border);border-radius:999px;padding:7px 16px;font-family:var(--fm);font-size:11px;color:var(--muted)}
.pill-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:.3s}
.pill-dot.loading{background:var(--acc);animation:blink .8s ease-in-out infinite}
.pill-dot.ready{background:var(--green);box-shadow:0 0 8px rgba(29,184,90,.4)}
.pill-dot.err{background:#ff3333}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* upload zone */
.upload-zone{
  width:100%;background:var(--card);border:2.5px dashed var(--border);border-radius:20px;
  padding:40px 20px;display:flex;flex-direction:column;align-items:center;gap:12px;
  cursor:pointer;transition:border-color .2s,background .2s;position:relative;overflow:hidden
}
.upload-zone:hover,.upload-zone.drag{border-color:var(--acc);background:#fff8f5}
.upload-zone.has-img{border-style:solid;border-color:var(--border);padding:0;cursor:default}
.upload-icon{font-size:48px;line-height:1;transition:transform .2s}
.upload-zone:hover .upload-icon{transform:scale(1.1) rotate(-5deg)}
.upload-title{font-size:18px;font-weight:700;color:var(--ink)}
.upload-sub{font-size:13px;color:var(--muted)}
.upload-btn{background:var(--acc);color:#fff;border:none;border-radius:10px;padding:10px 22px;font-family:var(--fh);font-size:13px;font-weight:700;cursor:pointer;transition:.18s;margin-top:4px}
.upload-btn:hover{background:#e55a1e;transform:translateY(-1px)}
#fileInput{display:none}

/* preview image */
#previewImg{width:100%;max-height:380px;object-fit:contain;display:none;border-radius:18px}

/* result section */
.result-wrap{width:100%;display:flex;flex-direction:column;gap:16px}

/* top result card */
.top-result{
  background:var(--card);border:2px solid var(--border);border-radius:20px;
  padding:24px 22px;display:flex;align-items:center;gap:18px;
  transition:border-color .3s,box-shadow .3s
}
.top-result.show{border-color:var(--acc);box-shadow:0 4px 32px rgba(255,107,43,.1)}
.tr-emoji{font-size:56px;line-height:1;flex-shrink:0}
.tr-emoji.pop{animation:epop .4s ease}
@keyframes epop{0%{transform:scale(.3) rotate(-20deg);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.tr-info{flex:1;min-width:0}
.tr-label{font-size:11px;font-family:var(--fm);letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.tr-name{font-size:26px;font-weight:800;letter-spacing:-.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-name.pop{animation:npop .35s ease}
@keyframes npop{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.tr-conf{font-family:var(--fm);font-size:13px;color:var(--muted);margin-top:3px}
.tr-conf b{color:var(--green);font-size:15px}

/* confidence bar for top result */
.conf-bar-wrap{margin-top:10px}
.conf-bar-track{height:6px;background:var(--card2);border-radius:999px;overflow:hidden}
.conf-bar-fill{height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg,var(--acc),#ffb347);transition:width .6s cubic-bezier(.4,0,.2,1)}

/* other predictions */
.others-title{font-family:var(--fm);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.others{display:flex;flex-direction:column;gap:8px}
.other-row{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:12px 16px;display:grid;grid-template-columns:32px 1fr auto;align-items:center;gap:10px;transition:border-color .2s}
.other-row:hover{border-color:var(--acc2)}
.or-rank{font-family:var(--fm);font-size:11px;color:var(--muted);text-align:center}
.or-info{min-width:0}
.or-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.or-bar-track{height:4px;background:var(--card2);border-radius:999px;overflow:hidden;margin-top:4px}
.or-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--acc2),#66bbff);transition:width .5s .1s ease}
.or-pct{font-family:var(--fm);font-size:12px;color:var(--muted);font-weight:500;white-space:nowrap}

/* change btn */
.change-btn{background:transparent;border:1.5px solid var(--border);border-radius:10px;padding:9px 18px;font-family:var(--fh);font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:.18s;align-self:center}
.change-btn:hover{border-color:var(--ink);color:var(--ink)}

/* info footer */
.info-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;width:100%}
.info-chip{background:var(--card);border:1.5px solid var(--border);border-radius:999px;padding:6px 14px;font-family:var(--fm);font-size:10px;color:var(--muted);letter-spacing:1px}
.info-chip b{color:var(--ink)}

/* loading spinner overlay */
.spinner-wrap{display:none;flex-direction:column;align-items:center;gap:12px;padding:32px 0}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-txt{font-family:var(--fm);font-size:12px;color:var(--muted);letter-spacing:1px}
</style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <h1>Animal <em>AI</em></h1>
    <p class="sub">Şəkil yüklə · Neyron şəbəkə tanısın</p>
  </div>

  <div class="status-pill">
    <div class="pill-dot loading" id="pillDot"></div>
    <span id="pillTxt">MobileNet modeli yüklənir…</span>
  </div>

  <!-- Upload -->
  <div class="upload-zone" id="uploadZone">
    <div class="upload-icon">🐾</div>
    <div class="upload-title">Şəkil buraya sürükle</div>
    <div class="upload-sub">və ya faylı seç</div>
    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Fayl seç</button>
    <input type="file" id="fileInput" accept="image/*"/>
    <img id="previewImg" alt="preview"/>
  </div>

  <!-- Spinner -->
  <div class="spinner-wrap" id="spinnerWrap">
    <div class="spinner"></div>
    <div class="spinner-txt">Analiz edilir…</div>
  </div>

  <!-- Results -->
  <div class="result-wrap" id="resultWrap" style="display:none">

    <div class="top-result" id="topResult">
      <div class="tr-emoji" id="trEmoji">🐶</div>
      <div class="tr-info">
        <div class="tr-label">Ən yüksək ehtimal</div>
        <div class="tr-name" id="trName">—</div>
        <div class="tr-conf">Ehtimal: <b id="trConf">—</b></div>
        <div class="conf-bar-wrap">
          <div class="conf-bar-track"><div class="conf-bar-fill" id="confBarFill"></div></div>
        </div>
      </div>
    </div>

    <div class="others-title">Digər ehtimallar</div>
    <div class="others" id="othersEl"></div>

    <button class="change-btn" id="changeBtn">↩ Başqa şəkil yüklə</button>
  </div>

  <div class="info-row">
    <div class="info-chip">Model: <b>MobileNet v2</b></div>
    <div class="info-chip">1000 sinif: <b>ImageNet</b></div>
    <div class="info-chip">Tamamilə <b>offline</b> işləyir</div>
  </div>

</div>

<!-- TF.js + MobileNet -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.0/dist/mobilenet.min.js"></script>

<script>
// ── Emoji map for common animals ──────────────────
const EMOJI_MAP = {
  dog:       '🐶', cat:     '🐱', bird:     '🐦',
  fish:      '🐟', shark:   '🦈', lion:     '🦁',
  tiger:     '🐯', bear:    '🐻', elephant: '🐘',
  horse:     '🐴', cow:     '🐄', pig:      '🐷',
  chicken:   '🐔', duck:    '🦆', goose:    '🦢',
  rabbit:    '🐰', hamster: '🐹', mouse:    '🐭',
  snake:     '🐍', frog:    '🐸', turtle:   '🐢',
  crocodile: '🐊', lizard:  '🦎', parrot:   '🦜',
  owl:       '🦉', eagle:   '🦅', penguin:  '🐧',
  flamingo:  '🦩', peacock: '🦚', zebra:    '🦓',
  giraffe:   '🦒', monkey:  '🐒', gorilla:  '🦍',
  wolf:      '🐺', fox:     '🦊', deer:     '🦌',
  panda:     '🐼', koala:   '🐨', kangaroo: '🦘',
  dolphin:   '🐬', whale:   '🐳', octopus:  '🐙',
  crab:      '🦀', lobster: '🦞', bee:      '🐝',
  butterfly: '🦋', ant:     '🐜', spider:   '🕷️',
  snail:     '🐌', worm:    '🪱', bat:      '🦇',
  hedgehog:  '🦔', raccoon: '🦝', skunk:    '🦨',
  camel:     '🐪', llama:   '🦙', sheep:    '🐑',
  goat:      '🐐', rooster: '🐓', turkey:   '🦃',
};

function getEmoji(label) {
  const l = label.toLowerCase();
  for (const [key, emoji] of Object.entries(EMOJI_MAP)) {
    if (l.includes(key)) return emoji;
  }
  return '🔍';
}

function cleanLabel(raw) {
  // ImageNet labels are like "n02099712 Labrador_retriever"
  // Remove synset id, replace underscores, title case
  return raw
    .replace(/^n\d+\s*/,'')
    .replace(/_/g,' ')
    .replace(/,.*$/,'')    // take first part if comma-separated
    .split(' ')
    .map(w => w.charAt(0).toUpperCase() + w.slice(1))
    .join(' ');
}

// ── DOM refs ──────────────────────────────────────
const pillDot     = document.getElementById('pillDot');
const pillTxt     = document.getElementById('pillTxt');
const uploadZone  = document.getElementById('uploadZone');
const fileInput   = document.getElementById('fileInput');
const previewImg  = document.getElementById('previewImg');
const spinnerWrap = document.getElementById('spinnerWrap');
const resultWrap  = document.getElementById('resultWrap');
const topResult   = document.getElementById('topResult');
const trEmoji     = document.getElementById('trEmoji');
const trName      = document.getElementById('trName');
const trConf      = document.getElementById('trConf');
const confBarFill = document.getElementById('confBarFill');
const othersEl    = document.getElementById('othersEl');
const changeBtn   = document.getElementById('changeBtn');

let model = null;

// ── Load model ────────────────────────────────────
async function loadModel() {
  try {
    model = await mobilenet.load({ version: 2, alpha: 1.0 });
    pillDot.className = 'pill-dot ready';
    pillTxt.textContent = 'Model hazırdır — şəkil yüklə!';
  } catch(e) {
    pillDot.className = 'pill-dot err';
    pillTxt.textContent = 'Model yüklənmədi. İnternet bağlantısını yoxla.';
    console.error(e);
  }
}
loadModel();

// ── File handling ─────────────────────────────────
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

// Drag & drop
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

// Click anywhere on zone (when no image)
uploadZone.addEventListener('click', e => {
  if (!uploadZone.classList.contains('has-img') && e.target !== document.querySelector('.upload-btn')) {
    fileInput.click();
  }
});

changeBtn.addEventListener('click', resetUI);

function handleFile(file) {
  if (!file.type.startsWith('image/')) { alert('Zəhmət olmasa şəkil faylı seç!'); return; }
  const url = URL.createObjectURL(file);
  previewImg.src = url;
  previewImg.style.display = 'block';
  uploadZone.classList.add('has-img');
  // Hide upload decorations
  uploadZone.querySelectorAll('.upload-icon,.upload-title,.upload-sub,.upload-btn').forEach(el => el.style.display = 'none');
  previewImg.onload = () => classify(previewImg);
}

// ── Classify ──────────────────────────────────────
async function classify(imgEl) {
  if (!model) { alert('Model hələ yüklənir, bir az gözlə!'); return; }
  resultWrap.style.display = 'none';
  spinnerWrap.style.display = 'flex';

  try {
    const preds = await model.classify(imgEl, 5);
    spinnerWrap.style.display = 'none';
    showResults(preds);
  } catch(e) {
    spinnerWrap.style.display = 'none';
    alert('Xəta baş verdi: ' + e.message);
    console.error(e);
  }
}

// ── Show results ──────────────────────────────────
function showResults(preds) {
  if (!preds || preds.length === 0) return;

  const top   = preds[0];
  const name  = cleanLabel(top.className);
  const conf  = (top.probability * 100).toFixed(1);
  const emoji = getEmoji(top.className);

  // Top card
  trEmoji.textContent = emoji;
  trEmoji.classList.remove('pop'); void trEmoji.offsetWidth; trEmoji.classList.add('pop');
  trName.textContent  = name;
  trName.classList.remove('pop'); void trName.offsetWidth; trName.classList.add('pop');
  trConf.textContent  = conf + '%';
  topResult.classList.add('show');

  // Animate bar
  confBarFill.style.width = '0%';
  setTimeout(() => { confBarFill.style.width = conf + '%'; }, 50);

  // Change bar color by confidence
  if (top.probability > 0.7) confBarFill.style.background = 'linear-gradient(90deg,#1db85a,#44ffaa)';
  else if (top.probability > 0.4) confBarFill.style.background = 'linear-gradient(90deg,var(--acc),#ffb347)';
  else confBarFill.style.background = 'linear-gradient(90deg,#aaa,#ccc)';

  // Others
  othersEl.innerHTML = '';
  preds.slice(1).forEach((p, i) => {
    const n  = cleanLabel(p.className);
    const c  = (p.probability * 100).toFixed(1);
    const row = document.createElement('div');
    row.className = 'other-row';
    row.innerHTML = `
      <span class="or-rank">#${i+2}</span>
      <div class="or-info">
        <div class="or-name">${getEmoji(p.className)} ${n}</div>
        <div class="or-bar-track"><div class="or-bar-fill" id="orf${i}" style="width:0%"></div></div>
      </div>
      <span class="or-pct">${c}%</span>`;
    othersEl.appendChild(row);
    setTimeout(() => {
      document.getElementById('orf'+i).style.width = c + '%';
    }, 100 + i * 60);
  });

  resultWrap.style.display = 'flex';
}

// ── Reset ─────────────────────────────────────────
function resetUI() {
  uploadZone.classList.remove('has-img');
  previewImg.style.display = 'none';
  previewImg.src = '';
  uploadZone.querySelectorAll('.upload-icon,.upload-title,.upload-sub,.upload-btn').forEach(el => el.style.display = '');
  resultWrap.style.display = 'none';
  topResult.classList.remove('show');
  confBarFill.style.width = '0%';
  othersEl.innerHTML = '';
  fileInput.value = '';
}
</script>
</body>
</html>
